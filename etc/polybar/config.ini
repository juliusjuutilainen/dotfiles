;==========================================================
;   Polybar config — monochromatic, no Nerd Font required
;==========================================================

[colors]
background     = #1a1a1a
background-alt = #2a2a2a
foreground     = #c0c0c0
dim            = #606060
accent         = #909090
bright         = #e0e0e0
alert          = #cc6666

[bar/example]
width          = 100%
height         = 24pt
radius         = 0

offset-y       = 0
border-size    = 0
border-color   = #00000000

background     = ${colors.background}
foreground     = ${colors.foreground}

line-size      = 1pt

padding-left   = 1
padding-right  = 1

module-margin  = 1

separator      = //
separator-foreground = ${colors.dim}

font-0 = monospace:size=9;2

modules-left   = xworkspaces xwindow
modules-center = date
modules-right  = media weather pulseaudio network

cursor-click   = pointer
cursor-scroll  = ns-resize

enable-ipc     = true

;==========================================================
; LEFT
;==========================================================

[module/xworkspaces]
type = internal/xworkspaces

label-active            = [%name%]
label-active-foreground = ${colors.bright}
label-active-padding    = 1

label-occupied          = %name%
label-occupied-padding  = 1

label-urgent            = !%name%!
label-urgent-foreground = ${colors.alert}
label-urgent-padding    = 1

label-empty             = %name%
label-empty-foreground  = ${colors.dim}
label-empty-padding     = 1

[module/xwindow]
type             = internal/xwindow
label            = %title:0:50:...%
label-foreground = ${colors.dim}

;==========================================================
; CENTER
;==========================================================

[module/date]
type     = internal/date
interval = 1

date     = %H:%M
date-alt = %A %d %b  %H:%M:%S

label            = %date%
label-foreground = ${colors.bright}

;==========================================================
; RIGHT
;==========================================================

[module/media]
type          = custom/script
exec          = playerctl metadata title 2>/dev/null | cut -c1-35 | sed 's/^/>> /'
exec-if       = playerctl status 2>/dev/null | grep -qE "Playing|Paused"
interval      = 2
label         = %output%
label-foreground = ${colors.accent}
click-left    = playerctl play-pause
click-right   = playerctl next
scroll-up     = playerctl next
scroll-down   = playerctl previous

[module/weather]
type          = custom/script
exec          = curl -sf "https://wttr.in/?format=%t" 2>/dev/null | tr -cd '[:print:]' || echo "?"
interval      = 600
label         = %output%
label-foreground = ${colors.accent}

[module/pulseaudio]
type = internal/pulseaudio

format-volume          = <label-volume>
label-volume           = vol %percentage%%
label-volume-foreground = ${colors.foreground}

label-muted            = muted
label-muted-foreground = ${colors.dim}

click-right = pavucontrol &

[module/network]
type               = internal/network
interface-type     = wireless
interval           = 5

label-connected            = %essid%
label-connected-foreground = ${colors.foreground}
label-disconnected         = offline
label-disconnected-foreground = ${colors.dim}

;==========================================================

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini